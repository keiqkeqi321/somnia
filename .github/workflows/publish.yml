name: Publish Releases

on:
  push:
    tags:
      - "v*"

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check VERSION matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          echo "Tag:     $TAG_VERSION"
          echo "VERSION: $FILE_VERSION"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

  publish-pypi:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

  publish-npm:
    runs-on: ubuntu-latest
    needs: verify-version
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org/

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  build-desktop:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg,app
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Python package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install desktop UI dependencies
        working-directory: desktop/ui
        run: npm ci

      - name: Build bundled sidecar
        run: python scripts/release/build_desktop_sidecar.py --target-triple ${{ matrix.target }}

      - name: Build desktop bundles
        working-directory: desktop/ui
        run: npm run tauri:build -- --config src-tauri/tauri.bundle.conf.json --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --ci --no-sign

      - name: Prepare release assets
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          $bundleRoot = Join-Path $PWD "desktop/ui/src-tauri/target/$env:TARGET_TRIPLE/release/bundle"
          $assetRoot = Join-Path $env:RUNNER_TEMP "release-assets/$env:TARGET_TRIPLE"
          New-Item -ItemType Directory -Path $assetRoot -Force | Out-Null

          $copied = @()
          foreach ($pattern in @("*.msi", "*.dmg")) {
            foreach ($item in @(Get-ChildItem -Path $bundleRoot -Recurse -File -Filter $pattern -ErrorAction SilentlyContinue)) {
              $assetName = "somnia-desktop-$env:RELEASE_TAG-$env:TARGET_TRIPLE$($item.Extension)"
              $destination = Join-Path $assetRoot $assetName
              Copy-Item -LiteralPath $item.FullName -Destination $destination -Force
              $copied += $destination
            }
          }

          if (-not $copied) {
            throw "No release assets were produced under $bundleRoot"
          }

      - name: Upload desktop release assets
        uses: actions/upload-artifact@v4
        with:
          name: somnia-desktop-release-${{ matrix.target }}
          path: ${{ runner.temp }}/release-assets/${{ matrix.target }}
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs:
      - publish-pypi
      - publish-npm
      - build-desktop
    if: always() && needs.publish-pypi.result == 'success' && needs.build-desktop.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download desktop release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: somnia-desktop-release-*
          merge-multiple: true

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG=$(sed -n "/^## $VERSION/,/^## /{ /^## $VERSION/p; /^## [0-9]/d; p; }" CHANGELOG.md | head -50)
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Somnia ${{ steps.version.outputs.tag }}
          body: |
            ## Somnia ${{ steps.version.outputs.tag }}

            ${{ steps.changelog.outputs.content }}

            ---

            Install Python package:
            ```bash
            pip install somnia
            pip install --upgrade somnia
            ```

            PyPI: https://pypi.org/project/somnia/${{ steps.version.outputs.version }}/
          files: |
            release-assets/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
