name: Desktop Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg,app
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Python package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install desktop UI dependencies
        working-directory: desktop/ui
        run: npm ci

      - name: Build bundled sidecar
        run: python scripts/release/build_desktop_sidecar.py --target-triple ${{ matrix.target }}

      - name: Build desktop bundles
        working-directory: desktop/ui
        run: npm run tauri:build -- --config src-tauri/tauri.bundle.conf.json --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --ci --no-sign

      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: somnia-desktop-${{ matrix.target }}
          path: desktop/ui/src-tauri/target/${{ matrix.target }}/release/bundle
          if-no-files-found: error
